name: Release

# Triggered by pushing a version tag, e.g. git tag v0.1.0 && git push --tags
on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Rust crate → crates.io ─────────────────────────────────────────────────
  crates-io:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish -p monatq --token ${{ secrets.CRATES_IO_TOKEN }}

  # ── Python wheels (one job per platform) ───────────────────────────────────
  build-wheels:
    name: Build wheels (${{ matrix.target }})
    strategy:
      matrix:
        include:
          # Linux x86_64 — native, manylinux container for broad distro compat
          - os: ubuntu-latest
            target: x86_64
          # Linux aarch64 — cross-compiled via QEMU inside manylinux container
          - os: ubuntu-latest
            target: aarch64
          # macOS universal2 — single fat binary for both Intel and Apple Silicon
          - os: macos-latest
            target: universal2-apple-darwin
          # Windows x86_64
          - os: windows-latest
            target: x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          # --manifest-path points maturin at the Python package within the workspace
          args: >-
            --release
            --out dist
            --manifest-path monatq-py/rust/Cargo.toml
            --interpreter python3.12
          manylinux: auto   # wraps Linux builds in a manylinux container automatically
          sccache: true     # caches Rust compilation across runs
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  # ── Source distribution ────────────────────────────────────────────────────
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path monatq-py/rust/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  # ── Upload everything to PyPI ──────────────────────────────────────────────
  pypi:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    # 'pypi' environment must be configured in GitHub repo settings with
    # trusted publishing enabled (no API token needed).
    environment: pypi
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
